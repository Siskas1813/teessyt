{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Поиск</h2>
  <p>Запрос: {{ query|safe }}</p>
</div>
<table>
  <tr><th>ID</th><th>Отправитель</th><th>Тема</th><th>Фрагмент</th></tr>
  {% for r in results %}
  <tr>
    <td>{{ r.id }}</td>
    <td>{{ r.sender }}</td>
    <td><a href="/mail/{{ r.id }}">{{ r.subject|safe }}</a></td>
    <td>{{ r.body|safe }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
