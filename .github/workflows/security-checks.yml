name: Security checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install semgrep bandit pip-audit detect-secrets

      - name: Create reports directory
        run: |
          mkdir -p reports/ci

      - name: Run Semgrep SAST
        run: |
          semgrep scan --config p/python --config p/default \
            --exclude ".venv" \
            --exclude "uploads" \
            --exclude "corp_mail.db" \
            --json \
            --output reports/ci/semgrep-ci.json .
        continue-on-error: true

      - name: Run Bandit Python security scan
        run: |
          bandit -r . \
            -x ".venv,uploads" \
            -f json \
            -o reports/ci/bandit-ci.json || echo "Bandit found issues" > reports/ci/bandit-exit.txt

      - name: Run pip-audit SCA
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --progress-spinner off \
            --output reports/ci/pipaudit-ci.json || echo "pip-audit found vulnerabilities" > reports/ci/pipaudit-exit.txt

      - name: Run detect-secrets
        run: |
          detect-secrets scan > reports/ci/detect-secrets-ci.json
        continue-on-error: true

      - name: Start web application for DAST
        env:
          APP_HOST: 0.0.0.0
          APP_PORT: 5000
          APP_DEBUG: false
        run: |
          python app.py > reports/ci/app.log 2>&1 &
          echo $! > reports/ci/app.pid
          sleep 5

      - name: Check web application availability
        run: |
          echo "Checking application availability..."
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/ > /dev/null; then
              echo "Application is available"
              exit 0
            fi
            echo "Waiting for application... attempt $i"
            sleep 2
          done
          echo "Application did not start or root page is unavailable"
          cat reports/ci/app.log
          exit 1

      - name: Check web application availability from Docker
        run: |
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            curlimages/curl:latest \
            -fsS http://host.docker.internal:5000/

      - name: Prepare ZAP report directory permissions
        run: |
          mkdir -p reports/ci
          chmod -R 777 reports/ci

      - name: Run OWASP ZAP baseline scan
        run: |
          docker run --rm \
            --user root \
            --add-host=host.docker.internal:host-gateway \
            -v ${{ github.workspace }}/reports/ci:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://host.docker.internal:5000/ \
            -r zap-ci.html \
            -J zap-ci.json \
            -w zap-ci.md || echo "ZAP completed with non-zero exit code" > reports/ci/zap-exit.txt

      - name: List generated reports
        if: always()
        run: |
          echo "Generated reports:"
          ls -la reports/ci

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/ci/